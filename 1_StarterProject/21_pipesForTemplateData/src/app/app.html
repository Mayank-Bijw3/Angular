<app-header />

<main>
    <ul id="users">
       @for (user of users; track user.id) {
        <li>
            <app-user 
            [isSelected]="user.id === selectedUserId"
            [user]="user" 
            (pqr)="onSelectUser($event)" />
        </li>
       }
    </ul>

    @if (selectedUser) {
        <app-tasks [id]="selectedUser.id" [userId]="selectedUserId"  [name]="selectedUser.name"   />
    } @else {
        <p>No user selected</p>
    }
</main>
