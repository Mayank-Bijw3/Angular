<form (ngSubmit)="onSubmit()" #form > <!--or just send titleInput.value as string -->
     <app-control class="control" label="Title"  /> 

        <input name="title" id="title"  [(ngModel)] = "enteredTitle">

    <p>
        <app-control class="control" label="Request">
            <textarea name="request" id="request" rows="3"   [(ngModel)]="enteredText"></textarea>
        </app-control>
    </p>

    <p><button appButton >
        Submit
        <span ngProjectAs="icon">
            >
        </span>
    </button>
</p>
</form>
