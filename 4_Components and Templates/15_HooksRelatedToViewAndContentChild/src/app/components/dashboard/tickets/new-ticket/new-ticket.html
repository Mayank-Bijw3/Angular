<form (ngSubmit)="onSubmit(titleInput,textInput.value)" #form > <!--or just send titleInput.value as string -->
     <app-control class="control" label="Title"  /> 
     <!--template variable declared by # and can be use anywhere in tamplate(html) without hash  -->
        <input name="title" id="title" #titleInput #input>

    <p>
        <app-control class="control" label="Request">
            <textarea name="request" id="request" rows="3" #textInput #input></textarea>
        </app-control>
    </p>

    <p><button appButton #btn> <!-- by this appButton as selector when we declare an templateVariable the angular creates a button tye variable 
                                    if we remove appButton then it will create HTMLButton type element
                                    and simillar for all other component as well-->
        Submit
        <span ngProjectAs="icon">
            >
        </span>
    </button>
</p>
</form>
